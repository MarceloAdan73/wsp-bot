name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: ./bot

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          path: ./bot

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test